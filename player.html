<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Escape the Smart Room — Player</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap');
  :root { --bg:#0d0d0f; --surface:#18181c; --surface2:#222228; --accent:#f5c800; --accent2:#ff4d6d; --accent3:#00d4aa; --text:#f0eeea; --muted:#888; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Space Grotesk',sans-serif; min-height:100dvh; overflow:hidden; touch-action:manipulation; }
  .screen { display:none; width:100vw; min-height:100dvh; flex-direction:column; align-items:center; justify-content:center; padding:1.5rem; }
  .screen.active { display:flex; }

  /* JOIN */
  #s-join { gap:1.25rem; }
  .join-title { font-family:'Black Han Sans',sans-serif; font-size:2.5rem; color:var(--accent); text-align:center; }
  .join-sub { color:var(--muted); font-size:.85rem; text-align:center; }
  .join-form { display:flex; flex-direction:column; gap:.85rem; width:100%; max-width:300px; }
  .field { background:var(--surface2); border:2px solid #333; border-radius:10px; color:var(--text); font-family:'Space Grotesk',sans-serif; font-size:1.1rem; font-weight:600; padding:.8rem 1rem; outline:none; text-align:center; transition:border-color .2s; width:100%; }
  .field:focus { border-color:var(--accent); }
  .field::placeholder { color:#555; font-weight:400; }
  .code-field { letter-spacing:6px; text-transform:uppercase; font-size:1.4rem; }
  .btn { font-family:'Black Han Sans',sans-serif; font-size:1.1rem; letter-spacing:1px; padding:.85rem; border:none; border-radius:10px; cursor:pointer; width:100%; transition:transform .1s,opacity .2s; }
  .btn:active { transform:scale(.97); }
  .btn-primary { background:var(--accent); color:#0d0d0f; }
  .btn-disabled { background:#333; color:#666; cursor:not-allowed; }

  /* WAITING */
  #s-wait { gap:1rem; text-align:center; }
  .wait-emoji { font-size:4rem; animation:bounce 1.5s ease-in-out infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  .wait-title { font-family:'Black Han Sans',sans-serif; font-size:1.8rem; color:var(--accent); }
  .wait-sub { font-family:'Space Mono',monospace; font-size:.8rem; color:var(--muted); letter-spacing:2px; }
  .my-score { font-family:'Black Han Sans',sans-serif; font-size:3.5rem; color:var(--accent); }
  .my-score-label { font-family:'Space Mono',monospace; font-size:.75rem; color:var(--muted); letter-spacing:3px; text-transform:uppercase; }

  /* QUESTION / ANSWERING */
  #s-answer { gap:1rem; justify-content:flex-start; padding-top:2rem; }
  .q-cat-badge { background:var(--surface2); border:1px solid #333; border-radius:20px; padding:.28rem .8rem; font-size:.72rem; font-weight:700; color:var(--accent); letter-spacing:1px; text-transform:uppercase; }
  .q-text-player { font-family:'Black Han Sans',sans-serif; font-size:clamp(1.2rem,5vw,1.7rem); line-height:1.2; text-align:center; max-width:360px; }
  .timer-ring-wrap { position:relative; width:70px; height:70px; flex-shrink:0; }
  .timer-ring { transform:rotate(-90deg); }
  .timer-ring-bg { fill:none; stroke:var(--surface2); stroke-width:6; }
  .timer-ring-fg { fill:none; stroke:var(--accent); stroke-width:6; stroke-linecap:round; transition:stroke-dashoffset 1s linear, stroke .5s; }
  .timer-ring-fg.urgent { stroke:var(--accent2); }
  .timer-num { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'Black Han Sans',sans-serif; font-size:1.4rem; color:var(--accent); }
  .timer-num.urgent { color:var(--accent2); }

  .ans-btns { display:grid; grid-template-columns:1fr 1fr; gap:.65rem; width:100%; max-width:360px; }
  .ans-btn { font-family:'Black Han Sans',sans-serif; font-size:1.05rem; padding:1.1rem .5rem; border-radius:12px; border:2px solid #333; background:var(--surface2); color:var(--text); cursor:pointer; transition:all .15s; touch-action:manipulation; user-select:none; display:flex; flex-direction:column; align-items:center; gap:.2rem; }
  .ans-btn .ltr { font-size:1.5rem; color:var(--accent); }
  .ans-btn .ans-txt { font-size:.8rem; font-weight:600; }
  .ans-btn:active { transform:scale(.95); }
  .ans-btn.selected { border-color:var(--accent); background:#f5c80018; }
  .ans-btn.is-correct { border-color:var(--accent3); background:#00d4aa18; color:var(--accent3); }
  .ans-btn.is-correct .ltr { color:var(--accent3); }
  .ans-btn.is-wrong { border-color:var(--accent2); background:#ff4d6d10; opacity:.6; }
  .ans-btn:disabled { cursor:not-allowed; }

  /* RESULT FEEDBACK */
  #s-result { gap:1rem; text-align:center; }
  .result-icon { font-size:5rem; animation:popIn .4s cubic-bezier(.34,1.56,.64,1); }
  @keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
  .result-title { font-family:'Black Han Sans',sans-serif; font-size:2.5rem; }
  .result-title.correct { color:var(--accent3); }
  .result-title.wrong { color:var(--accent2); }
  .result-pts { font-family:'Black Han Sans',sans-serif; font-size:1.2rem; color:var(--muted); }
  .total-score { font-family:'Black Han Sans',sans-serif; font-size:4rem; color:var(--accent); }
  .total-label { font-family:'Space Mono',monospace; font-size:.75rem; color:var(--muted); letter-spacing:3px; text-transform:uppercase; }

  /* DONE */
  #s-done { gap:1rem; text-align:center; }
  .done-title { font-family:'Black Han Sans',sans-serif; font-size:3rem; color:var(--accent); line-height:.9; }

  /* FLASH */
  .flash { position:fixed; inset:0; pointer-events:none; z-index:100; opacity:0; transition:opacity .15s; }
  .flash.correct { background:var(--accent3); }
  .flash.wrong { background:var(--accent2); }
  .toast { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%) translateY(120%); background:var(--surface2); border:2px solid var(--accent); border-radius:8px; padding:.55rem 1.2rem; font-family:'Space Mono',monospace; font-size:.8rem; color:var(--accent); z-index:200; transition:transform .4s cubic-bezier(.34,1.56,.64,1); max-width:88vw; text-align:center; }
  .toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="flash" id="flash"></div>
<div class="toast" id="toast"></div>

<!-- ══ JOIN ══ -->
<div class="screen active" id="s-join">
  <div class="join-title">ESCAPE THE<br>SMART ROOM</div>
  <div class="join-sub">Enter the room code from the host screen</div>
  <div class="join-form">
    <input class="field code-field" id="codeInput" placeholder="CODE" maxlength="4" oninput="this.value=this.value.toUpperCase()" />
    <input class="field" id="nameInput" placeholder="Your name" maxlength="20" />
    <button class="btn btn-primary" id="joinBtn">LET'S GO 🔥</button>
  </div>
</div>

<!-- ══ WAITING ══ -->
<div class="screen" id="s-wait">
  <div class="wait-emoji" id="waitEmoji">🦊</div>
  <div class="wait-title" id="waitName">Player</div>
  <div class="wait-sub">Waiting for host to start...</div>
  <div style="margin-top:1rem;">
    <div class="my-score" id="waitScore">0</div>
    <div class="my-score-label">points</div>
  </div>
</div>

<!-- ══ ANSWERING ══ -->
<div class="screen" id="s-answer">
  <div class="q-cat-badge" id="pCat">Category</div>
  <div style="display:flex;align-items:center;gap:1rem;width:100%;max-width:360px;justify-content:space-between;">
    <div class="q-text-player" id="pQText">Question...</div>
    <div class="timer-ring-wrap">
      <svg class="timer-ring" width="70" height="70" viewBox="0 0 70 70">
        <circle class="timer-ring-bg" cx="35" cy="35" r="29"/>
        <circle class="timer-ring-fg" id="timerRing" cx="35" cy="35" r="29"/>
      </svg>
      <div class="timer-num" id="timerNum">20</div>
    </div>
  </div>
  <div class="ans-btns" id="ansBtns"></div>
  <div style="font-family:'Space Mono',monospace;font-size:.72rem;color:#444;margin-top:.5rem;" id="ansStatus"></div>
</div>

<!-- ══ ROUND RESULT ══ -->
<div class="screen" id="s-result">
  <div class="result-icon" id="resultIcon">✅</div>
  <div class="result-title" id="resultTitle">CORRECT!</div>
  <div class="result-pts" id="resultPts">+500 pts</div>
  <div style="margin-top:.75rem;">
    <div class="total-score" id="resultTotal">0</div>
    <div class="total-label">total points</div>
  </div>
</div>

<!-- ══ GAME DONE ══ -->
<div class="screen" id="s-done">
  <div style="font-size:4rem;">🏆</div>
  <div class="done-title">GAME<br>OVER!</div>
  <div style="font-family:'Space Mono',monospace;font-size:.85rem;color:var(--muted);margin-top:.5rem;">Check the host screen for results</div>
  <div style="margin-top:1rem;">
    <div class="total-score" id="doneScore">0</div>
    <div class="total-label">final points</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

let db = null;
let roomCode = '';
let playerId = '';
let playerName = '';
let playerEmoji = '';
let myScore = 0;
let currentQ = -1;
let answered = false;
let timerInterval = null;

const EMOJIS = ["🦊","🐼","🦄","🐸","🦁","🐙","🦋","🦜","🐬","🦀","🦩","🐧","🦝","🐻","🦖","🌮","🎸","🏄","🧠","⚡"];

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function flash(type) {
  const el = document.getElementById('flash');
  el.className = `flash ${type}`;
  el.style.opacity = '.25';
  setTimeout(() => el.style.opacity = '0', 400);
}

function toast(msg, dur = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ── SOUND ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
function getACtx() {
  if (!actx) actx = new AudioCtx();
  if (actx.state === 'suspended') actx.resume();
  return actx;
}
function playTone(freq, type, dur, vol = 0.3, delay = 0) {
  const ctx = getACtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, ctx.currentTime + delay);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
  osc.start(ctx.currentTime + delay);
  osc.stop(ctx.currentTime + delay + dur);
}
function soundBuzzIn() { playTone(440,'square',.08,.3); playTone(880,'square',.08,.3,.06); }
function soundCorrect() {
  playTone(523,'sine',.1,.4); playTone(659,'sine',.1,.4,.1); playTone(784,'sine',.25,.4,.2);
}
function soundWrong() { playTone(200,'sawtooth',.3,.3); playTone(150,'sawtooth',.3,.3,.2); }
function soundTick() { playTone(1400,'square',.04,.12); }

// ── WIRE UP JOIN BUTTON (avoids ES module scope issue with onclick) ──
document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('joinBtn');
  if (btn) btn.addEventListener('click', () => window.joinGame());
  // Also allow Enter key on inputs
  ['codeInput','nameInput'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('keydown', e => { if (e.key === 'Enter') window.joinGame(); });
  });
});

// ── JOIN ──
window.joinGame = async function() {
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  const name = document.getElementById('nameInput').value.trim();
  if (code.length < 2) { toast('Enter the room code!'); return; }
  if (!name) { toast('Enter your name!'); return; }

  // We need Firebase config — for GitHub Pages, we'll embed it via URL params
  // or ask player to enter it. Simpler: read from URL query string.
  const params = new URLSearchParams(window.location.search);
  const apiKey = params.get('apiKey');
  const dbURL = params.get('dbURL');
  const projectId = params.get('projectId');

  if (!apiKey || !dbURL || !projectId) {
    toast('Missing Firebase config in URL — see host instructions');
    return;
  }

  try {
    const app = initializeApp({ apiKey, databaseURL: dbURL, projectId }, 'player-' + Date.now());
    db = getDatabase(app);
  } catch(e) {
    toast('Could not connect — check config');
    return;
  }

  // Check room exists
  const gameSnap = await get(ref(db, 'games/' + code));
  if (!gameSnap.exists()) { toast('Room not found! Check the code.'); return; }

  roomCode = code;
  playerName = name;
  playerId = 'p' + Date.now();
  playerEmoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];

  // Register player
  await update(ref(db, 'games/' + roomCode + '/players/' + playerId), {
    name: playerName,
    score: 0,
    emoji: playerEmoji,
  });

  document.getElementById('waitEmoji').textContent = playerEmoji;
  document.getElementById('waitName').textContent = playerName;
  document.getElementById('waitScore').textContent = '0';
  showScreen('s-wait');

  // Listen for game state
  onValue(ref(db, 'games/' + roomCode), snap => {
    if (!snap.exists()) return;
    const game = snap.val();

    // Update my score from server
    if (game.players && game.players[playerId]) {
      myScore = game.players[playerId].score || 0;
      document.getElementById('waitScore').textContent = myScore;
    }

    if (game.phase === 'question' && game.currentQ !== currentQ) {
      currentQ = game.currentQ;
      answered = false;
      showQuestion(game.question, game.currentQ);
    }

    if (game.phase === 'question' && game.revealed && answered) {
      showRoundResult(game.correctAnswer);
    }

    if (game.phase === 'done') {
      document.getElementById('doneScore').textContent = myScore;
      showScreen('s-done');
    }
  });
}

function showQuestion(q, qIdx) {
  if (!q) return;
  clearInterval(timerInterval);
  answered = false;

  document.getElementById('pCat').textContent = q.category;
  document.getElementById('pQText').textContent = q.text;
  document.getElementById('ansStatus').textContent = '';

  // Timer ring
  const circumference = 2 * Math.PI * 29;
  const ring = document.getElementById('timerRing');
  ring.style.strokeDasharray = circumference;
  ring.style.strokeDashoffset = '0';
  ring.classList.remove('urgent');
  document.getElementById('timerNum').classList.remove('urgent');

  let timeLeft = q.timeLimit;
  document.getElementById('timerNum').textContent = timeLeft;

  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById('timerNum').textContent = timeLeft;
    const offset = circumference * (1 - timeLeft / q.timeLimit);
    ring.style.strokeDashoffset = offset;
    if (timeLeft <= 5) {
      ring.classList.add('urgent');
      document.getElementById('timerNum').classList.add('urgent');
      soundTick();
    }
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      if (!answered) {
        document.getElementById('ansStatus').textContent = "Time's up! Waiting for host...";
        disableAnswers();
      }
    }
  }, 1000);

  // Answer buttons
  const letters = ['A','B','C','D'];
  document.getElementById('ansBtns').innerHTML = q.answers.map((a, i) =>
    `<button class="ans-btn" id="ab${i}">
      <span class="ltr">${letters[i]}</span>
      <span class="ans-txt">${a}</span>
    </button>`
  ).join('');

  // Attach listeners after rendering (avoids ES module scope issue)
  q.answers.forEach((_, i) => {
    const btn = document.getElementById('ab' + i);
    if (btn) btn.addEventListener('click', () => submitAnswer(i));
  });

  showScreen('s-answer');
}


  if (answered) return;
  answered = true;
  clearInterval(timerInterval);
  soundBuzzIn();

  // Highlight selected
  for (let i = 0; i < 4; i++) {
    const btn = document.getElementById('ab' + i);
    if (btn) {
      btn.disabled = true;
      if (i === idx) btn.classList.add('selected');
    }
  }
  document.getElementById('ansStatus').textContent = 'Answer locked in! ⚡ Waiting for host...';

  // Write answer to Firebase
  update(ref(db, 'games/' + roomCode + '/answers'), { [playerId]: idx });
}

function disableAnswers() {
  for (let i = 0; i < 4; i++) {
    const btn = document.getElementById('ab' + i);
    if (btn) btn.disabled = true;
  }
}

function showRoundResult(correctAnswer) {
  clearInterval(timerInterval);
  // Find what I answered
  const myBtns = document.querySelectorAll('.ans-btn');
  let myAnswer = -1;
  myBtns.forEach((btn, i) => { if (btn.classList.contains('selected')) myAnswer = i; });

  const isCorrect = myAnswer === correctAnswer;

  // Reveal correct/wrong on buttons before switching screen
  for (let i = 0; i < 4; i++) {
    const btn = document.getElementById('ab' + i);
    if (!btn) continue;
    btn.disabled = true;
    if (i === correctAnswer) btn.classList.add('is-correct');
    else if (i === myAnswer) btn.classList.add('is-wrong');
  }

  setTimeout(() => {
    if (isCorrect) {
      myScore += 500;
      document.getElementById('resultIcon').textContent = '🎉';
      document.getElementById('resultTitle').textContent = 'CORRECT!';
      document.getElementById('resultTitle').className = 'result-title correct';
      document.getElementById('resultPts').textContent = '+500 pts';
      soundCorrect();
      flash('correct');
    } else if (myAnswer === -1) {
      document.getElementById('resultIcon').textContent = '⏰';
      document.getElementById('resultTitle').textContent = "TOO SLOW!";
      document.getElementById('resultTitle').className = 'result-title wrong';
      document.getElementById('resultPts').textContent = '+0 pts';
      soundWrong();
      flash('wrong');
    } else {
      document.getElementById('resultIcon').textContent = '😬';
      document.getElementById('resultTitle').textContent = 'WRONG!';
      document.getElementById('resultTitle').className = 'result-title wrong';
      document.getElementById('resultPts').textContent = '+0 pts';
      soundWrong();
      flash('wrong');
    }
    document.getElementById('resultTotal').textContent = myScore;
    showScreen('s-result');

    // Go back to wait screen after a few seconds
    setTimeout(() => {
      document.getElementById('waitScore').textContent = myScore;
      showScreen('s-wait');
    }, 3500);
  }, 600);
}

</script>
</body>
</html>
